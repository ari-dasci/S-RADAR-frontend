<div class="modal-header d-flex justify-content-between align-items-center">
    <span class="font-weight-bold">Datasets</span>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="cancelar()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
  <div class="tab-content" id="nav-tabContent">

    <!-- TAB PARAMETERS -->
    <div class="tab-pane fade show active" id="nav-geral">
      <form *ngIf="formDataset" [formGroup]="formDataset">
        <div class="form-group">

          <!-- Dynamically generate form fields -->
        <select class="form-control" formControlName="datasetSelected" placeholder="Select a dataset">
            <option *ngFor="let param of itemSelectedParams | keyvalue" [value]="param.key">
            {{ param.value }}
            </option>
        </select>
        </div>
      </form>

  </div>

</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="save_params()">Save</button>
</div>
