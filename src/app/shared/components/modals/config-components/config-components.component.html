<div class="modal-header">
  <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="cancelar()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body">
  <app-nav-tabs-config [itemSelected]="itemSelected"></app-nav-tabs-config>
  <div class="tab-content" id="nav-tabContent">

    <!-- TAB PARAMETERS -->
    <div class="tab-pane fade show active" id="nav-geral">
      <form *ngIf="formGeral" [formGroup]="formGeral">
        <div class="form-group">

          <!-- Dynamically generate form fields -->
          <div *ngFor="let control of formGeral.controls | keyvalue">
            <label [for]="control.key">{{ control.key }}</label>
            <div class="position-relative">
              <input *ngIf="!isReadonly(control.key)" type="text" class="form-control" [id]="control.key" [formControlName]="control.key"
                [ngClass]="{ 'readonly-input': isReadonly(control.key) }" [placeholder]="'Enter ' + control.key"
                [readonly]="isReadonly(control.key)" />
              <!-- Display truncated value as overlay when readonly -->
              
              <input *ngIf="isReadonly(control.key)" type="text" class="form-control" [id]="control.key" [value]="toString(control.key)"
                [ngClass]="{ 'readonly-input': isReadonly(control.key) }" [placeholder]="'Enter ' + control.key"
                [readonly]="isReadonly(control.key)" />
            </div>

          </div>
        </div>
      </form>
    </div>

  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="save_params()">Save</button>
  </div>
